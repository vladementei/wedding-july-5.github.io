    /* no extra global crease network */
    .page::before {
      content: '';

      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: none;
    }

    /* ─── CONTENT ───────────────────────────────────────── */
    .content {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;

    /* ─── GREETING ──────────────────────────────────────── */

      position: absolute;
      top: 10mm;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      font-size: 4.1mm;
      font-weight: 400;
      color: #1a1a1a;
      letter-spacing: 0.12mm;

      display: flex;
      flex-direction: column;
    }
    .greeting strong { font-weight: 700; }

    /* ─── PHOTOS BLOCK ──────────────────────────────────── */
    /*
      In the original, photos + "Save the date" occupy ~62% of page height ≈ 130mm
      Starting from y≈14mm (just below greeting)
    */
    .photos-block {
      position: absolute;
      top: 16mm;
      left: 0;
      right: 0;
      height: 122mm;
    }

    /* "Save the date" — overlaps top of polaroids */
    .save-the-date {
      position: absolute;
      top: 10mm;
      right: 22mm;
      font-family: 'Caveat';
      font-size: 18.5mm;
      color: #c2172b;
      transform: rotate(-11deg);
      transform-origin: right top;
      z-index: 10;
      white-space: nowrap;
      line-height: 1;
      filter: drop-shadow(0 1px 2.5px rgba(0,0,0,0.12));
      font-weight: 600;
      letter-spacing: -1.1mm;
    }

    /* Polaroid pair — anchored from top (not bottom) */
    .polaroids {
      position: absolute;
      top: 30mm;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: flex-start;
      gap: 5mm;
    }

    .qr-code img {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translateX(-50%) translateY(-50%);
      height: 85mm;
      object-position: left;
    }

    .polaroid {
      background: #fff;
      padding: 2.8mm 2.8mm 0 2.8mm;
      box-shadow: 2px 4px 10px rgba(0,0,0,0.22), 0 1px 3px rgba(0,0,0,0.10);
      flex-shrink: 0;
    }

    .polaroid-left {
      width: 57mm;
      transform: rotate(-5deg);
      z-index: 6;
    }

    /* right polaroid slightly lower and tilted */
    .polaroid-right {
      width: 57mm;
      transform: rotate(4deg) translateY(6mm);
      z-index: 5;
    }

    .polaroid img {
      display: block;
      width: 100%;
      object-fit: cover;
      object-position: center 12%;
    }

    .polaroid-left img  { height: 76mm;       object-position: left;}
    .polaroid-right img { height: 76mm; }

    /* white area below photo inside polaroid */
    .polaroid-caption-area {
      height: 10mm;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 1mm;
    }

    .polaroid-caption {
      font-family: 'Caveat', cursive;
      font-size: 6mm;
      font-weight: 700;
      color: #1a1a1a;
      text-align: center;
      line-height: 1.2;
      font-style: italic;
    }

      top: 139mm;
      left: 0;
      right: 43mm;

      line-height: 1.35;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.08));
      transform: rotate(347deg);
      letter-spacing: -1.1mm;

    /* ─── CALENDAR ──────────────────────────────────────── */
    .calendar {
      position: absolute;
      top: 159mm;
      left: 7%;
      right: 7%;
    }

    .cal-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border-top: 0.45mm solid #2a2a2a;
      border-bottom: 0.45mm solid #2a2a2a;
      padding: 1.3mm 0;
    }

    .cal-header span {
      display: block;
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      font-size: 2.9mm;
      font-weight: 500;
      color: #1a1a1a;
      letter-spacing: 0.05mm;
      -webkit-text-fill-color: #1a1a1a;
    }

    .cal-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-top: 2mm;
      align-items: center;
    }

    .cal-row .dn {
      display: block;
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      font-size: 3.3mm;
      font-weight: 400;
      color: #1a1a1a;
      -webkit-text-fill-color: #1a1a1a;
    }

    /* Red heart highlight */

      align-items: center;
      justify-content: center;
      position: relative;
    }

      height: 8.5mm;
      fill: #c2172b;
      display: block;
      transform: scale(1.4) rotate(360deg);

      top: 50%;
      left: 50%;

      -webkit-text-fill-color: #fff;

      letter-spacing: 0.08mm;
    }

            <span class="hn">5</span>
          </div>
        </span>
      </div>
    </div>

    <!-- Footer -->

  </div>
</div>
